{% extends "layout.html"%}

{% block container1 %}

<section class="bg-neutral-primary">
  <div class="py-8 px-4 mx-auto max-w-screen-xl lg:py-16 lg:px-12">

<div class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default">

    <table class="w-full text-sm text-left rtl:text-right text-body">
        <thead class="bg-neutral-secondary-soft border-b border-default">
            <tr>
                <th scope="col" class="px-6 py-3 font-medium">
                    Nombre
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Apellido
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Email
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Telefono
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Inscribir
                </th>
            </tr>
        </thead>
        <tbody>
         {% for alum in alumnos %}
         <tr
          class="">

        <td class="px-6 py-4">{{ alum.nombre }}</td>
        <td class="px-6 py-4">{{ alum.apaterno }}</td>
        <td class="px-6 py-4">{{ alum.email }}</td>
        <td class="px-6 py-4">{{ alum.telefono }}</td>
        <td class="px-6 py-4 text-right">
        <a href="InscribirCursos?curso_id={{curso_id}}&alumno_id={{alum.id}}"
        class="text-white bg-gradient-to-r from-purple-500 via-purple-600 to-purple-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-purple-300 dark:focus:ring-purple-800 font-medium rounded-base text-sm px-4 py-2.5 text-center leading-5">
        Inscribir</a>
        </td>

         </tr>
         {% endfor %}

        </tbody>
    </table>
</div>
  </div>
</section>

{% endblock container1 %}
